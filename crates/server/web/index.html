<!doctype html>
<!-- Parcello web client. Single file, no build step, served by the game
     server itself (embedded via include_str!). Talks the same JSON/WS
     protocol as parcello-cli; the server remains the only authority. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parcello</title>
<style>
  :root {
    --bg: #1c1f26; --panel: #262b35; --line: #3a4150; --text: #e8e6e0;
    --muted: #9aa3b2; --accent: #d8b45a; --board: #dfe7d8; --tilebg: #f4f7ef;
    --danger: #c0564f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.4 system-ui, sans-serif;
  }
  /* Touch-friendly: min 44px tall, generous padding (mobile-ready). */
  button {
    background: var(--accent); border: 0; border-radius: 6px;
    padding: 10px 18px; min-height: 44px; font-size: 15px; font-weight: 600;
    cursor: pointer; color: #221d0e;
  }
  button.secondary { background: var(--line); color: var(--text); }
  button.danger { background: var(--danger); color: #fff; }
  button:disabled { opacity: .45; cursor: default; }
  input, select {
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 10px 10px; font-size: 15px; min-height: 44px;
  }
  /* Login uses full-width buttons for a clean, mobile-like column. */
  #login button { width: 100%; }
  #login {
    max-width: 360px; margin: 12vh auto; background: var(--panel);
    padding: 24px; border-radius: 8px; display: flex; flex-direction: column; gap: 10px;
  }
  #login h1 { margin: 0 0 4px; color: var(--accent); }
  #app { display: none; grid-template-columns: minmax(560px, 1fr) 340px; gap: 12px; padding: 12px; }
  /* Board: a d x d grid ring (32 -> 9x9, 40 -> 11x11); grid-template is set
     dynamically in buildBoard(). Corners span 1 cell, counter-clockwise. */
  #board {
    display: grid; aspect-ratio: 1; max-height: calc(100vh - 24px);
    gap: 2px; background: var(--line); padding: 2px; border-radius: 6px;
  }
  .tile {
    background: var(--tilebg); color: #222; border-radius: 2px;
    display: flex; flex-direction: column; overflow: hidden;
    font-size: 10px; position: relative; min-width: 0;
  }
  .tile.mine { outline: 2px solid #2f6f3e; cursor: pointer; }
  .tile .band { height: 9px; flex: none; }
  .tile .name { padding: 2px 3px; flex: 1; overflow: hidden; }
  .tile .meta { padding: 0 3px 2px; color: #555; display: flex; gap: 3px; flex-wrap: wrap; }
  .tile .houses { color: #2f6f3e; font-weight: 700; }
  .tile .mort { color: var(--danger); font-weight: 700; }
  .tile .owner { position: absolute; top: 1px; right: 1px; width: 8px; height: 8px; border-radius: 2px; }
  .tile .pawns { position: absolute; bottom: 2px; left: 2px; display: flex; gap: 2px; }
  .pawn { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #0007; }
  #center {
    grid-area: 2 / 2 / 11 / 11; background: var(--board); border-radius: 4px;
    color: #2a2a2a; display: flex; flex-direction: column; padding: 10px; gap: 8px;
    min-height: 0; position: relative;
  }
  /* Dice result, floating over the middle of the board (ADR: playfeel). */
  #dice {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    gap: 18px; pointer-events: none; opacity: 0; transition: opacity .3s;
  }
  #dice .die {
    width: 66px; height: 66px; background: #fff; border-radius: 12px;
    box-shadow: 0 4px 10px #0008; display: grid;
    grid-template: repeat(3, 1fr) / repeat(3, 1fr); padding: 9px; gap: 3px;
  }
  #dice .die i { border-radius: 50%; background: #1e1e1e; align-self: center; justify-self: center; width: 12px; height: 12px; }
  #dice .die i.off { visibility: hidden; }
  #center h2 { margin: 0; font-size: 20px; letter-spacing: 2px; }
  #status { font-weight: 600; }
  .setgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; margin-top: 8px; }
  .setgrid label { display: flex; flex-direction: column; font-size: 12px; gap: 2px; }
  .setgrid label.chk { flex-direction: row; align-items: center; gap: 6px; grid-column: 1 / -1; }
  .setgrid input[type=number] { width: 100%; }
  #actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  #log {
    flex: 1; overflow-y: auto; background: #fffdf6; border: 1px solid #c9c4ae;
    border-radius: 4px; padding: 6px 8px; font-size: 12px; min-height: 0;
  }
  #log div { padding: 1px 0; border-bottom: 1px dotted #e2ddc8; }
  #side { display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .card { background: var(--panel); border-radius: 8px; padding: 12px; }
  .card h3 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; color: var(--muted); }
  .player { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .player .dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
  .player.current { font-weight: 700; }
  .player.me .nm::after { content: " (you)"; color: var(--muted); font-weight: 400; }
  .player.dead { opacity: .4; text-decoration: line-through; }
  .player .cash { margin-left: auto; font-variant-numeric: tabular-nums; }
  .offer { border-top: 1px solid var(--line); padding: 6px 0; font-size: 13px; }
  .offer .btns { margin-top: 4px; display: flex; gap: 6px; }
  #tilemenu {
    position: fixed; background: var(--panel); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px; display: none; flex-direction: column; gap: 6px; z-index: 10;
  }
  #trade { display: none; flex-direction: column; gap: 8px; }
  #trade .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  #trade .list { max-height: 120px; overflow-y: auto; font-size: 12px; }
  dialog::backdrop { background: #0008; }
  .muted { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<div id="login">
  <h1>Parcello</h1>
  <input id="name" placeholder="Display name" maxlength="24" autocomplete="off">
  <input id="token" placeholder="Identity token (optional)" autocomplete="off">
  <input id="code" placeholder="Room code (leave empty to create)" maxlength="5"
         style="text-transform:uppercase" autocomplete="off">
  <input id="mods" placeholder="Mods, comma-separated (optional, create only)" autocomplete="off">
  <button id="go">Play</button>
  <div id="loginmsg" class="muted"></div>
</div>

<div id="app">
  <div id="board"></div>
  <div id="side">
    <div class="card">
      <h3>Room <span id="roomcode" title="Click to copy" style="cursor:pointer;color:var(--accent);letter-spacing:2px"></span>
        <span id="copiedmsg" class="muted" style="font-size:12px"></span></h3>
      <div id="players"></div>
      <div id="lobbyctl" style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
        <button id="start">Start game</button>
        <button id="addbot" class="secondary" title="Bots yield their seat when a player joins">Add bot</button>
        <button id="rmbot" class="secondary">Remove bot</button>
      </div>
      <details id="settingspanel" style="margin-top:10px">
        <summary style="cursor:pointer;font-weight:600">Game settings</summary>
        <div class="setgrid">
          <label>Game length (min, 0=off)<input id="set_game" type="number" min="0"></label>
          <label>Turn limit (s, 0=off)<input id="set_turn" type="number" min="0"></label>
          <label>Time bank (s, 0=off)<input id="set_bank" type="number" min="0"></label>
          <label>Starting balance<input id="set_starting_balance" type="number" min="0"></label>
          <label>GO salary<input id="set_go_salary" type="number" min="0"></label>
          <label>Jail fine<input id="set_jail_fine" type="number" min="0"></label>
          <label>Max houses (1-5)<input id="set_max_houses" type="number" min="1" max="5"></label>
          <label>Bankruptcy threshold<input id="set_bankruptcy" type="number" min="0"></label>
          <label>Expropriation %<input id="set_expropriation" type="number" min="0"></label>
          <label>Rent boost %<input id="set_rent_boost" type="number" min="0"></label>
          <label>Domination groups (0=off)<input id="set_win_groups" type="number" min="0"></label>
          <label>Victory points target (0=off)<input id="set_win_points" type="number" min="0"></label>
          <label>Subsidiary pool factor (0=off)<input id="set_subsidiary_pool" type="number" min="0"></label>
          <label>Conglomerate pool factor (0=off)<input id="set_conglomerate_pool" type="number" min="0"></label>
        </div>
        <button id="applysettings" style="margin-top:8px">Apply settings</button>
      </details>
    </div>
    <div class="card" id="tradecard">
      <h3>Trades</h3>
      <div id="offers" class="muted">No open offers.</div>
      <button id="newtrade" class="secondary" style="margin-top:8px">New offer</button>
      <div id="trade">
        <select id="tr_to"></select>
        <div class="cols">
          <div>
            <div class="muted">You give</div>
            <input id="tr_gc" type="number" min="0" value="0" style="width:100%">
            <div id="tr_gt" class="list"></div>
          </div>
          <div>
            <div class="muted">You want</div>
            <input id="tr_rc" type="number" min="0" value="0" style="width:100%">
            <div id="tr_rt" class="list"></div>
          </div>
        </div>
        <div style="display:flex; gap:6px">
          <button id="tr_send">Propose</button>
          <button id="tr_close" class="secondary">Close</button>
        </div>
      </div>
    </div>
    <!-- Game over: replay together, or go back to the start screen. -->
    <div class="card" id="gameover" style="display:none">
      <h3 id="govwinner"></h3>
      <div style="display:flex; gap:6px">
        <button id="playagain" style="flex:1">Play again</button>
        <button id="continue" class="secondary" style="flex:1">Continue</button>
      </div>
      <div class="muted" style="margin-top:6px">"Play again" restarts for everyone still here.</div>
    </div>
    <!-- Post-game survey: a plain side card, never a modal - it must not
         block anything (no frustration by design). -->
    <div class="card" id="fb" style="display:none">
      <h3>How was the game? <span id="fbx" style="float:right;cursor:pointer">&#10005;</span></h3>
      <div id="fbstars" style="font-size:22px;cursor:pointer;letter-spacing:6px;color:#d8b45a">
        <span data-r="1">&#9734;</span><span data-r="2">&#9734;</span><span data-r="3">&#9734;</span><span data-r="4">&#9734;</span><span data-r="5">&#9734;</span>
      </div>
      <input id="fbtext" placeholder="Anything to add? (optional)" maxlength="500"
             style="width:100%;margin:6px 0" autocomplete="off">
      <button id="fbsend" disabled>Send</button>
      <span id="fbthanks" class="muted" style="display:none">Thanks for the feedback!</span>
    </div>
    <div class="card">
      <button id="resign" class="danger">Resign</button>
    </div>
  </div>
</div>

<div id="tilemenu"></div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const PAWN_COLORS = ["#c0564f","#3d7dc0","#4d9e5a","#c8963f","#8a5fb3","#4fa3a8"];
const GROUP_COLORS = {
  brown:"#8a5a3b", lightblue:"#8fc7e8", pink:"#d76fa3", orange:"#e08a3c",
  red:"#c0564f", yellow:"#e0c93c", green:"#4d9e5a", navy:"#3b5a8a",
  resort:"#2a9d8f", transit:"#444", works:"#999",
};

// -- connection state ---------------------------------------------------------
let ws = null;
const st = { seat: null, code: null, content: null, view: null, seats: [], gameEndsAt: null, timeBankSeconds: null, banks: null, bankEndsAt: null, bidEndsAt: null };
// Sealed-bid window (ADR-0018): a local approximation of the server's 5s
// deadline, set the moment we first see the phase and cleared once it's
// gone - the server alone resolves the window, this is display-only.
function trackBidWindow() {
  if (st.view?.turn.type === "blind_auction") {
    if (!st.bidEndsAt) st.bidEndsAt = Date.now() + 5000;
  } else {
    st.bidEndsAt = null;
  }
}

function send(cmd) { ws?.send(JSON.stringify({ type: "cmd", cmd })); }
function log(text) {
  const el = document.createElement("div");
  el.textContent = text;
  $("#log")?.appendChild(el);
  $("#log").scrollTop = $("#log").scrollHeight;
}

$("#go").onclick = () => {
  const name = $("#name").value.trim();
  const code = $("#code").value.trim().toUpperCase();
  const token = $("#token").value.trim();
  if (!name && !token) { $("#loginmsg").textContent = "Name or identity token required."; return; }
  if (name) localStorage.setItem("parcello_name", name);
  connect(name, code, token);
};
$("#name").value = localStorage.getItem("parcello_name") || "";
$("#code").value = (location.hash || "").replace("#", "");

function connect(name, code, token) {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  // Identity token (ADR-0009) wins over guest name server-side.
  const auth = token ? { token } : { guest_name: name };
  // Seat ownership proof for guest rejoin (ADR-0008).
  const tok = code && localStorage.getItem(`parcello_tok_${code}`);
  if (tok) auth.reconnect = tok;
  ws.onopen = () => {
    // Room mod set (ADR-0006): only meaningful when creating.
    const mods = $("#mods").value.split(",").map(s => s.trim()).filter(Boolean);
    ws.send(JSON.stringify(code
      ? { type: "join", code, auth }
      : { type: "create", auth, ...(mods.length ? { mods } : {}) }));
  };
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose = () => {
    $("#loginmsg").textContent = "Disconnected. Enter the room code to rejoin.";
    if (st.code) $("#code").value = st.code;
    $("#login").style.display = "flex";
    $("#app").style.display = "none";
  };
}

// -- server messages ----------------------------------------------------------
function handle(msg) {
  switch (msg.type) {
    case "room_created":
      st.code = msg.code;
      location.hash = msg.code;
      break;
    case "joined":
      st.code = msg.code;
      st.seat = msg.seat;
      st.content = msg.content.content;
      st.seats = msg.players;
      st.settings = msg.settings;
      if (msg.reconnect) localStorage.setItem(`parcello_tok_${msg.code}`, msg.reconnect);
      st.gameEndsAt = deadlineFrom(msg.time_remaining);
      st.turnSeconds = msg.turn_seconds ?? null;
      st.turnEndsAt = deadlineFrom(st.turnSeconds);
      st.timeBankSeconds = msg.time_bank_seconds ?? null;
      st.banks = null;
      location.hash = msg.code;
      $("#login").style.display = "none";
      $("#app").style.display = "grid";
      $("#roomcode").textContent = msg.code;
      buildBoard();
      if (msg.view) st.view = msg.view;
      trackBidWindow();
      render();
      log(`Joined room ${msg.code}. Mods: ${msg.content.mods.map(m => m.id).join(", ")}`);
      break;
    case "lobby":
      st.seats = msg.players;
      st.settings = msg.settings;
      // Keep effective rules live for the tile menu (boost/seize costs).
      if (st.content) st.content.rules = msg.settings.rules;
      render();
      break;
    case "game_started":
      st.view = msg.view;
      st.gameEndsAt = deadlineFrom(msg.time_remaining);
      st.turnSeconds = msg.turn_seconds ?? null;
      st.turnEndsAt = deadlineFrom(st.turnSeconds);
      st.timeBankSeconds = msg.time_bank_seconds ?? null;
      st.banks = null;
      trackBidWindow();
      log("Game started.");
      render();
      break;
    case "update":
      st.view = msg.view;
      st.turnEndsAt = deadlineFrom(st.turnSeconds);
      st.banks = msg.banks ?? null;
      trackBidWindow();
      // The bank only starts draining once the plain turn window is spent;
      // until then it shows the flat reserve (ADR-0023).
      st.bankEndsAt = (st.turnEndsAt && st.banks)
        ? st.turnEndsAt + (st.banks[st.seat] ?? 0) * 1000
        : null;
      msg.events.forEach(ev => {
        if (ev.type === "dice_rolled") showDice(ev.d1, ev.d2);
        log(describe(ev));
      });
      render();
      break;
    case "rejected":
      log(`Rejected: ${msg.error.code}`);
      break;
    case "error":
      if ($("#app").style.display !== "grid") $("#loginmsg").textContent = msg.message;
      log(`Error: ${msg.message}`);
      break;
  }
}

// -- helpers over content/view --------------------------------------------------
const board = () => st.content.board;
const tileName = i => board()[i]?.name ?? `tile ${i}`;
const playerName = i => st.view?.players[i]?.name ?? st.seats[i]?.name ?? `seat ${i}`;
const prop = i => board()[i].kind.type === "property" ? board()[i].kind : null;
const isHousesModel = i => (prop(i)?.rent_model ?? "houses") === "houses";
const myTurn = () => st.view && st.view.current === st.seat;

// Timed games (ADR-0010): local countdown + net worth, mirroring the
// server's GameState::net_worth so the shown ranking predicts the winner.
const deadlineFrom = secs => secs == null ? null : Date.now() + secs * 1000;
function netWorth(seat) {
  const v = st.view; if (!v) return 0;
  let w = v.players[seat].cash;
  board().forEach((t, i) => {
    if (v.tiles[i].owner !== seat || t.kind.type !== "property") return;
    const price = t.kind.price ?? 0;
    w += v.tiles[i].mortgaged ? Math.floor(price / 2) : price;
    w += v.tiles[i].houses * (t.kind.house_cost ?? 0);
  });
  return w;
}
// Dice result overlay: two pip dice in the board centre, fading out.
const DICE_PIPS = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
function dieHtml(n) {
  const on = new Set(DICE_PIPS[n] || []);
  return `<div class="die">${[...Array(9)].map((_, i) => `<i class="${on.has(i) ? "" : "off"}"></i>`).join("")}</div>`;
}
let _diceTimer;
function showDice(d1, d2) {
  const el = $("#dice"); if (!el) return;
  el.innerHTML = dieHtml(d1) + dieHtml(d2);
  el.style.opacity = "1";
  clearTimeout(_diceTimer);
  _diceTimer = setTimeout(() => { el.style.opacity = "0"; }, 2500);
}

function fmtClock(deadline) {
  const secs = Math.max(0, Math.round((deadline - Date.now()) / 1000));
  return [secs, `${String(Math.floor(secs / 60)).padStart(2, "0")}:${String(secs % 60).padStart(2, "0")}`];
}
function tickCountdown() {
  const finished = st.view?.phase.type === "finished";
  const gel = $("#countdown");
  if (gel) {
    // Kept visible for the whole game, end included (the final time left is
    // part of a bankruptcy-before-timeout result).
    if (!st.gameEndsAt) { gel.textContent = ""; }
    else {
      const [secs, mmss] = fmtClock(st.gameEndsAt);
      gel.textContent = `⏱ ${mmss}`;
      gel.style.color = secs <= 60 ? "var(--danger)" : "inherit";
    }
  }
  // Per-turn AFK timer, shown only when the server enables --turn-timeout.
  const tel = $("#turntimer");
  if (tel) {
    if (!st.turnEndsAt || finished) { tel.textContent = ""; }
    else {
      const [secs, mmss] = fmtClock(st.turnEndsAt);
      tel.textContent = `⏳ ${mmss}`;
      tel.style.color = secs <= 10 ? "var(--danger)" : "inherit";
    }
  }
  // Personal time bank (ADR-0023): flat reserve until the turn window
  // expires, then it drains in real time toward the hard stop.
  const bel = $("#timebank");
  if (bel) {
    if (!st.timeBankSeconds || finished || !st.turnEndsAt) { bel.textContent = ""; }
    else if (Date.now() < st.turnEndsAt) {
      bel.textContent = `🏦 ${st.banks?.[st.seat] ?? st.timeBankSeconds}s`;
    } else if (st.bankEndsAt) {
      const [secs, mmss] = fmtClock(st.bankEndsAt);
      bel.textContent = `🏦 ${mmss}`;
      bel.style.color = secs <= 10 ? "var(--danger)" : "inherit";
    }
  }
  // Sealed-bid window (ADR-0018): a one-shot 5s countdown, local estimate
  // only - the server alone decides when the window actually closes.
  const biel = $("#bidtimer");
  if (biel) {
    if (!st.bidEndsAt || finished) { biel.textContent = ""; }
    else {
      const [secs, mmss] = fmtClock(st.bidEndsAt);
      biel.textContent = `🔨 ${mmss}`;
      biel.style.color = secs <= 2 ? "var(--danger)" : "inherit";
    }
  }
}
setInterval(tickCountdown, 1000);

// -- board rendering ------------------------------------------------------------
// A board of n tiles is a d x d ring when n = 4*(d-1) (32 -> 9, 40 -> 11).
// Tile 0 is the bottom-right corner, walking counter-clockwise.
const isRing = n => n >= 8 && n % 4 === 0;
const ringSide = n => n / 4 + 1;
function cellOf(i, d) {
  if (i <= d - 1) return { r: d, c: d - i };
  if (i <= 2 * d - 2) return { r: 2 * d - 1 - i, c: 1 };
  if (i <= 3 * d - 3) return { r: 1, c: i - 2 * d + 3 };
  return { r: i - 3 * d + 4, c: d };
}

function buildBoard() {
  const el = $("#board");
  el.innerHTML = "";
  const n = board().length;
  const classic = isRing(n);
  const d = ringSide(n);
  if (classic) el.style.gridTemplate = `repeat(${d}, 1fr) / repeat(${d}, 1fr)`;
  board().forEach((t, i) => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.id = `tile-${i}`;
    if (classic) {
      const { r, c } = cellOf(i, d);
      tile.style.gridArea = `${r} / ${c}`;
    }
    const p = prop(i);
    const band = document.createElement("div");
    band.className = "band";
    band.style.background = p ? (GROUP_COLORS[p.group] ?? "#777") : "#b9c2b0";
    tile.appendChild(band);
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = t.name;
    tile.appendChild(name);
    const meta = document.createElement("div");
    meta.className = "meta";
    if (p) meta.innerHTML = `<span>$${p.price}</span><span class="houses"></span><span class="mort"></span>`;
    if (t.kind.type === "tax") meta.textContent = `pay $${t.kind.amount}`;
    tile.appendChild(meta);
    const owner = document.createElement("div"); owner.className = "owner"; tile.appendChild(owner);
    const pawns = document.createElement("div"); pawns.className = "pawns"; tile.appendChild(pawns);
    tile.onclick = e => tileMenu(i, e);
    el.appendChild(tile);
  });
  if (classic) {
    const center = document.createElement("div");
    center.id = "center";
    // Interior spans the (d-2) x (d-2) inner cells.
    center.style.gridArea = `2 / 2 / ${d} / ${d}`;
    center.innerHTML = `<h2>PARCELLO <span id="countdown" style="float:right;font-size:16px"></span><span id="turntimer" style="float:right;font-size:16px;margin-right:12px"></span><span id="timebank" style="float:right;font-size:16px;margin-right:12px"></span><span id="bidtimer" style="float:right;font-size:16px;margin-right:12px"></span></h2><div id="status"></div><div id="pools" class="muted" style="font-size:12px"></div><div id="forecast" class="muted" style="font-size:12px"></div><div id="actions"></div><div id="log"></div><div id="dice"></div>`;
    el.appendChild(center);
  } else {
    // Non-ring boards (mods): linear fallback, panel below.
    el.style.display = "flex"; el.style.flexWrap = "wrap"; el.style.aspectRatio = "auto";
    document.querySelectorAll("#board .tile").forEach(t => { t.style.width = "90px"; t.style.height = "80px"; });
    const center = document.createElement("div");
    center.id = "center"; center.style.width = "100%"; center.style.minHeight = "220px";
    center.innerHTML = `<h2>PARCELLO <span id="countdown" style="float:right;font-size:16px"></span><span id="turntimer" style="float:right;font-size:16px;margin-right:12px"></span><span id="timebank" style="float:right;font-size:16px;margin-right:12px"></span><span id="bidtimer" style="float:right;font-size:16px;margin-right:12px"></span></h2><div id="status"></div><div id="pools" class="muted" style="font-size:12px"></div><div id="forecast" class="muted" style="font-size:12px"></div><div id="actions"></div><div id="log"></div><div id="dice"></div>`;
    el.appendChild(center);
  }
}

function render() {
  renderPlayers();
  if (!st.view) {
    setStatus(st.seats.length >= 2 ? "Ready — host can start." : "Waiting for players…");
    renderActions();
    return;
  }
  const v = st.view;
  renderPools(v);
  renderForecast(v);
  board().forEach((_, i) => {
    const ts = v.tiles[i];
    const el = $(`#tile-${i}`);
    const ownerEl = el.querySelector(".owner");
    ownerEl.style.background = ts.owner === null ? "transparent" : PAWN_COLORS[ts.owner % 6];
    el.classList.toggle("mine", ts.owner === st.seat);
    const h = el.querySelector(".houses");
    if (h) {
      h.textContent = ts.houses === 0 ? "" : ts.houses === 5 ? "CONGLOMERATE" : "\u25AA".repeat(ts.houses);
      if (ts.boosts) h.textContent += ` \u26A1${ts.boosts}`; // rent boost (ADR-0012)
    }
    const m = el.querySelector(".mort");
    if (m) m.textContent = ts.mortgaged ? "MORT." : "";
    el.querySelector(".pawns").innerHTML = "";
  });
  v.players.forEach((p, i) => {
    if (p.bankrupt) return;
    const pawn = document.createElement("div");
    pawn.className = "pawn";
    pawn.style.background = PAWN_COLORS[i % 6];
    pawn.title = p.name;
    $(`#tile-${p.position} .pawns`)?.appendChild(pawn);
  });
  renderStatus();
  renderActions();
  renderOffers();
  renderFeedback();
  renderGameOver();
  tickCountdown();
}

// -- post-game survey ---------------------------------------------------------
let fbRating = 0, fbDone = false;
function renderFeedback() {
  $("#fb").style.display = st.view?.phase.type === "finished" && !fbDone ? "block" : "none";
}
document.querySelectorAll("#fbstars span").forEach(s => s.onclick = () => {
  fbRating = Number(s.dataset.r);
  document.querySelectorAll("#fbstars span").forEach(x =>
    x.innerHTML = Number(x.dataset.r) <= fbRating ? "&#9733;" : "&#9734;");
  $("#fbsend").disabled = false;
});
$("#fbsend").onclick = () => {
  const comment = $("#fbtext").value.trim();
  ws?.send(JSON.stringify({ type: "feedback", rating: fbRating, ...(comment ? { comment } : {}) }));
  $("#fbsend").style.display = "none";
  $("#fbthanks").style.display = "inline";
  setTimeout(() => { fbDone = true; renderFeedback(); }, 1500);
};
$("#fbx").onclick = () => { fbDone = true; renderFeedback(); };

function renderPlayers() {
  const el = $("#players");
  el.innerHTML = "";
  const rows = st.view
    ? st.view.players.map((p, i) => ({ i, name: p.name, cash: p.cash, dead: p.bankrupt,
        victoryPoints: p.victory_points,
        extra: (p.in_jail ? " [jail]" : "") + (p.jail_cards ? ` [${p.jail_cards} jail card${p.jail_cards > 1 ? "s" : ""}]` : ""),
        connected: st.seats[i]?.connected ?? true, bot: st.seats[i]?.is_bot ?? false }))
    : st.seats.map(s => ({ i: s.seat, name: s.name, cash: null, dead: false,
        victoryPoints: 0, extra: "", connected: s.connected, bot: s.is_bot }));
  const vpTarget = st.content?.rules.win_victory_points ?? 0;
  rows.forEach(r => {
    const d = document.createElement("div");
    d.className = "player"
      + (st.view && r.i === st.view.current ? " current" : "")
      + (r.i === st.seat ? " me" : "")
      + (r.dead ? " dead" : "");
    // Net worth decides a timed game (ADR-0010), so surface it then.
    const nw = (r.cash !== null && st.gameEndsAt)
      ? ` <span class="muted">NW $${netWorth(r.i)}</span>` : "";
    // Victory points race (ADR-0020): "the race IS the game" when on.
    const vp = (r.cash !== null && vpTarget > 0)
      ? ` <span class="muted">VP ${r.victoryPoints}/${vpTarget}</span>` : "";
    const label = r.bot ? " \u{1F916}" : (r.connected ? "" : " (offline)");
    d.innerHTML = `<div class="dot" style="background:${PAWN_COLORS[r.i % 6]}"></div>
      <span class="nm">${escapeHtml(r.name)}${r.extra}${label}</span>
      ${r.cash === null ? "" : `<span class="cash">$${r.cash}${nw}${vp}</span>`}`;
    el.appendChild(d);
  });
  $("#lobbyctl").style.display = st.view ? "none" : "flex";
  const host = st.seat === 0;
  const full = st.seats.length >= 6;
  const bots = st.seats.filter(s => s.is_bot).length;
  $("#start").disabled = !host || st.seats.length < 2;
  $("#addbot").disabled = !host || full;
  $("#rmbot").disabled = !host || bots === 0;
  renderSettings();
}

// Per-room settings panel (ADR-0015): host edits, everyone sees. Hidden
// once the game starts (settings are frozen). Populating input values on
// each lobby update also snaps the host's fields to the server's clamped
// result after Apply.
function renderSettings() {
  const el = $("#settingspanel");
  if (!el) return;
  el.style.display = st.view ? "none" : "block";
  if (st.view || !st.settings) return;
  const host = st.seat === 0;
  const s = st.settings, r = s.rules;
  const put = (id, val) => { const e = $("#" + id); if (e) { e.value = val; e.disabled = !host; } };
  put("set_game", s.game_seconds ? Math.round(s.game_seconds / 60) : 0);
  put("set_turn", s.turn_seconds ?? 0);
  put("set_bank", s.time_bank_seconds ?? 0);
  put("set_starting_balance", r.starting_balance);
  put("set_go_salary", r.go_salary);
  put("set_jail_fine", r.jail_fine);
  put("set_max_houses", r.max_houses_per_property);
  put("set_bankruptcy", r.bankruptcy_threshold);
  put("set_expropriation", r.expropriation);
  put("set_rent_boost", r.rent_boost);
  put("set_win_groups", r.win_full_groups);
  put("set_win_points", r.win_victory_points);
  put("set_subsidiary_pool", r.subsidiary_pool_factor);
  put("set_conglomerate_pool", r.conglomerate_pool_factor);
  $("#applysettings").style.display = host ? "inline" : "none";
}

function applySettings() {
  const n = id => Math.max(0, parseInt($("#" + id).value || "0", 10) || 0);
  const gameMin = n("set_game"), turnSec = n("set_turn"), bankSec = n("set_bank");
  ws?.send(JSON.stringify({ type: "configure", settings: {
    game_seconds: gameMin > 0 ? gameMin * 60 : null,
    turn_seconds: turnSec > 0 ? turnSec : null,
    time_bank_seconds: bankSec > 0 ? bankSec : null,
    rules: {
      starting_balance: n("set_starting_balance"),
      go_salary: n("set_go_salary"),
      jail_fine: n("set_jail_fine"),
      max_houses_per_property: n("set_max_houses"),
      bankruptcy_threshold: n("set_bankruptcy"),
      expropriation: n("set_expropriation"),
      rent_boost: n("set_rent_boost"),
      win_full_groups: n("set_win_groups"),
      win_victory_points: n("set_win_points"),
      subsidiary_pool_factor: n("set_subsidiary_pool"),
      conglomerate_pool_factor: n("set_conglomerate_pool"),
    },
  } }));
}

function setStatus(text) { const s = $("#status"); if (s) s.textContent = text; }

// Shared building pools (ADR-0019): "the tension only works if everyone
// watches the shelf empty."
function renderPools(v) {
  const el = $("#pools");
  if (!el) return;
  if (v.subsidiaries_available == null && v.conglomerates_available == null) {
    el.textContent = "";
    return;
  }
  const pool = n => n == null ? "unlimited" : n;
  el.textContent = `Subsidiaries: ${pool(v.subsidiaries_available)} | Conglomerates: ${pool(v.conglomerates_available)}`;
}

// Public market forecast (ADR-0021): reveals draws already made, not the
// generator - a compact 3-slot timeline plus whatever is currently active.
const marketEventName = id => st.content?.market_events?.find(e => e.id === id)?.name ?? id;
function renderForecast(v) {
  const el = $("#forecast");
  if (!el) return;
  const f = v.forecast;
  if (!f || (!f.active && (!f.queue || f.queue.length === 0))) {
    el.textContent = "";
    return;
  }
  const parts = [];
  if (f.active) {
    parts.push(`${marketEventName(f.active.event_id)} active (${f.active.magnitude_pct > 0 ? "+" : ""}${f.active.magnitude_pct}%, ends turn ${f.active.ends_at_turn})`);
  }
  if (f.queue?.length) {
    parts.push(`upcoming: ${f.queue.map(s => `${marketEventName(s.event_id)} (turn ${s.starts_at_turn})`).join(", ")}`);
  }
  el.textContent = parts.join(" | ");
}

function renderStatus() {
  const v = st.view;
  if (v.phase.type === "finished") {
    setStatus(`Game over — ${playerName(v.phase.winner)} wins!`);
    return;
  }
  const t = v.turn;
  if (t.type === "blind_auction") {
    const pending = t.bids.map((b, i) => b === null ? i : null).filter(i => i !== null);
    const waiting = pending.map(playerName).join(", ") || "nobody";
    setStatus(`Sealed bid on ${tileName(t.tile)} — waiting on: ${waiting}`);
  } else {
    setStatus(`${playerName(v.current)}'s turn`);
  }
}

function renderActions() {
  const el = $("#actions");
  if (!el) return;
  el.innerHTML = "";
  const v = st.view;
  if (!v || v.phase.type === "finished") return;
  const btn = (label, cmd, cls) => {
    const b = document.createElement("button");
    b.textContent = label;
    if (cls) b.className = cls;
    b.onclick = () => send(cmd);
    el.appendChild(b);
  };
  const t = v.turn;
  if (t.type === "blind_auction") {
    // Every living seat may bid at once (ADR-0018), not a single actor:
    // show the overlay whenever we haven't submitted yet, regardless of
    // whose turn it nominally is. The discoverer's implicit floor bid is
    // list price if they stay silent and can afford it.
    if (t.bids[st.seat] !== null || v.players[st.seat].bankrupt) return;
    const isDiscoverer = v.current === st.seat;
    const floor = prop(t.tile).price;
    const label = document.createElement("span");
    label.className = "muted";
    label.textContent = isDiscoverer
      ? `Sealed bid on ${tileName(t.tile)} (floor $${floor} if you stay silent): `
      : `Sealed bid on ${tileName(t.tile)}: `;
    el.appendChild(label);
    const inp = document.createElement("input");
    inp.type = "number"; inp.min = 0; inp.value = floor;
    inp.style.width = "90px";
    el.appendChild(inp);
    const bid = document.createElement("button");
    bid.textContent = "Bid";
    bid.onclick = () => send({ type: "submit_blind_bid", amount: Number(inp.value) });
    el.appendChild(bid);
    btn("Abstain", { type: "submit_blind_bid", amount: 0 }, "secondary");
    return;
  }
  if (!myTurn()) return;
  if (t.type === "await_roll") {
    btn("Roll", { type: "roll" });
    if (v.players[st.seat].in_jail) {
      btn("Pay fine", { type: "pay_jail_fine" }, "secondary");
      if (v.players[st.seat].jail_cards > 0)
        btn("Use jail card", { type: "use_jail_card" }, "secondary");
    }
  } else if (t.type === "await_end") {
    btn("End turn", { type: "end_turn" });
  }
  const hint = document.createElement("span");
  hint.className = "muted";
  hint.textContent = "Click your tiles to build / mortgage.";
  el.appendChild(hint);
}

// -- tile context menu -----------------------------------------------------------
function tileMenu(i, evt) {
  const menu = $("#tilemenu");
  menu.style.display = "none";
  const v = st.view;
  if (!v) return;
  const ts = v.tiles[i];
  const id = board()[i].id;
  const rules = st.content.rules;
  const actions = [];
  if (ts.owner === st.seat) {
    if (isHousesModel(i) && !ts.mortgaged) actions.push([`Build house ($${prop(i).house_cost ?? 0})`, { type: "build", tile: id }]);
    if (ts.houses > 0) actions.push(["Sell house", { type: "sell_house", tile: id }]);
    // Rent boost (ADR-0012): raise this tile's rent one step.
    if (rules.rent_boost > 0 && !ts.mortgaged && (ts.boosts ?? 0) < 3)
      actions.push([`Boost rent ($${Math.floor(prop(i).price * rules.rent_boost / 100)})`, { type: "boost_rent", tile: id }]);
    actions.push(ts.mortgaged
      ? ["Redeem mortgage", { type: "unmortgage", tile: id }]
      : ["Mortgage", { type: "mortgage", tile: id }]);
  } else if (ts.owner !== null && prop(i) && rules.expropriation > 0 && !ts.mortgaged
      && myTurn() && v.turn.type === "await_end" && v.players[st.seat].position === i) {
    // Takeover (ADR-0022): seize a rival's property, landing tile only.
    // Improved tiles liquidate on seizure - the former owner is refunded
    // half cost per level on top of the usual compensation (ADR-0022).
    const label = ts.houses > 0
      ? `Seize + liquidate ($${Math.floor(prop(i).price * rules.expropriation / 100)})`
      : `Seize ($${Math.floor(prop(i).price * rules.expropriation / 100)})`;
    actions.push([label, { type: "expropriate", tile: id }]);
  }
  if (!actions.length) return;
  menu.innerHTML = `<div class="muted">${escapeHtml(tileName(i))}</div>`;
  actions.forEach(([label, cmd]) => {
    const b = document.createElement("button");
    b.className = "secondary"; b.textContent = label;
    b.onclick = () => { send(cmd); menu.style.display = "none"; };
    menu.appendChild(b);
  });
  menu.style.display = "flex";
  menu.style.left = Math.min(evt.clientX, innerWidth - 180) + "px";
  menu.style.top = Math.min(evt.clientY, innerHeight - 160) + "px";
  evt.stopPropagation();
}
document.addEventListener("click", () => { $("#tilemenu").style.display = "none"; });

// -- trades -----------------------------------------------------------------------
$("#newtrade").onclick = () => {
  const v = st.view;
  if (!v) return;
  const sel = $("#tr_to");
  sel.innerHTML = "";
  v.players.forEach((p, i) => {
    if (i === st.seat || p.bankrupt) return;
    const o = document.createElement("option");
    o.value = p.id; o.textContent = p.name;
    sel.appendChild(o);
  });
  fillTradeTiles();
  $("#trade").style.display = "flex";
};
$("#tr_to").onchange = fillTradeTiles;
$("#tr_close").onclick = () => { $("#trade").style.display = "none"; };
$("#tr_send").onclick = () => {
  const pick = box => [...box.querySelectorAll("input:checked")].map(c => c.value);
  send({
    type: "propose_trade",
    to: $("#tr_to").value,
    give_cash: Number($("#tr_gc").value) || 0,
    give_tiles: pick($("#tr_gt")),
    receive_cash: Number($("#tr_rc").value) || 0,
    receive_tiles: pick($("#tr_rt")),
  });
  $("#trade").style.display = "none";
};

function fillTradeTiles() {
  const v = st.view;
  const toSeat = v.players.findIndex(p => p.id === $("#tr_to").value);
  const fill = (box, seat) => {
    box.innerHTML = "";
    board().forEach((t, i) => {
      if (v.tiles[i].owner !== seat || !prop(i)) return;
      const l = document.createElement("label");
      l.style.display = "block";
      l.innerHTML = `<input type="checkbox" value="${t.id}"> ${escapeHtml(t.name)}`
        + (v.tiles[i].mortgaged ? " (M)" : "");
      box.appendChild(l);
    });
  };
  fill($("#tr_gt"), st.seat);
  fill($("#tr_rt"), toSeat);
}

function renderOffers() {
  const el = $("#offers");
  const v = st.view;
  const offers = v?.pending_trades ?? [];
  if (!offers.length) { el.textContent = "No open offers."; el.className = "muted"; return; }
  el.className = ""; el.innerHTML = "";
  const side = (cash, tiles) => {
    const parts = [];
    if (cash) parts.push(`$${cash}`);
    tiles.forEach(t => parts.push(tileName(t)));
    return parts.join(" + ") || "nothing";
  };
  offers.forEach(o => {
    const d = document.createElement("div");
    d.className = "offer";
    d.innerHTML = `<b>#${o.id}</b> ${escapeHtml(playerName(o.from))} gives
      ${escapeHtml(side(o.give_cash, o.give_tiles))} for
      ${escapeHtml(side(o.receive_cash, o.receive_tiles))}
      <span class="muted">(to ${escapeHtml(playerName(o.to))})</span>`;
    const btns = document.createElement("div");
    btns.className = "btns";
    const mk = (label, cmd, cls) => {
      const b = document.createElement("button");
      b.textContent = label; b.className = cls ?? "";
      b.onclick = () => send(cmd);
      btns.appendChild(b);
    };
    if (o.to === st.seat) {
      mk("Accept", { type: "accept_trade", trade: o.id });
      mk("Refuse", { type: "decline_trade", trade: o.id }, "secondary");
    }
    if (o.from === st.seat) mk("Cancel", { type: "cancel_trade", trade: o.id }, "secondary");
    d.appendChild(btns);
    el.appendChild(d);
  });
}

// -- event log ------------------------------------------------------------------------
function describe(e) {
  const P = playerName, T = tileName;
  switch (e.type) {
    case "turn_started": return `--- ${P(e.player)}'s turn ---`;
    case "dice_rolled": return `${P(e.player)} rolled ${e.d1}+${e.d2} = ${e.d1 + e.d2}`;
    case "moved": return `${P(e.player)} moved to ${T(e.to)}${e.passed_go ? " (passed Go)" : ""}`;
    case "salary_paid": return `${P(e.player)} collected $${e.amount} salary`;
    case "blind_auction_opened": return `${P(e.discoverer)} landed on ${T(e.tile)}: sealed bid open ($${e.floor} floor for ${P(e.discoverer)})`;
    case "blind_bid_submitted": return `${P(e.player)} submitted a bid`;
    case "blind_auction_resolved":
      return e.winner === null
        ? `${T(e.tile)} stays unsold`
        : `${P(e.winner)} won ${T(e.tile)} at $${e.amount}`;
    case "rent_paid": return `${P(e.from)} paid $${e.amount} rent to ${P(e.to)} for ${T(e.tile)}`;
    case "tax_paid": return `${P(e.player)} paid $${e.amount} tax`;
    case "card_drawn": return `${P(e.player)} drew: ${e.text}`;
    case "cash_adjusted":
      return `${P(e.player)} ${e.delta >= 0 ? "received" : "paid"} $${Math.abs(e.delta)} (${e.reason})`;
    case "house_built": return `${P(e.player)} built on ${T(e.tile)} (now ${e.houses})`;
    case "house_sold": return `${P(e.player)} sold a house on ${T(e.tile)} (+$${e.refund})`;
    case "expropriated": return `${P(e.player)} seized ${T(e.tile)} from ${P(e.from)} for $${e.cost}`
      + (e.liquidated > 0 ? ` (${e.liquidated} levels liquidated, $${e.liquidation_refund} to the former owner)` : "");
    case "rent_boosted": return `${P(e.player)} boosted ${T(e.tile)} rent to level ${e.boosts} for $${e.cost}`;
    case "property_mortgaged": return `${P(e.player)} mortgaged ${T(e.tile)} for $${e.value}`;
    case "property_unmortgaged": return `${P(e.player)} redeemed ${T(e.tile)} for $${e.cost}`;
    case "went_to_jail": return `${P(e.player)} went to jail`;
    case "jail_fine_paid": return `${P(e.player)} paid the $${e.amount} jail fine`;
    case "jail_card_received": return `${P(e.player)} received a get-out-of-jail-free card`;
    case "jail_card_used": return `${P(e.player)} used a get-out-of-jail-free card`;
    case "left_jail": return `${P(e.player)} left jail`;
    case "property_transferred":
      return e.to === null
        ? `${T(e.tile)} returned to the bank`
        : `${T(e.tile)} transferred to ${P(e.to)}`;
    case "trade_proposed": return `${P(e.from)} proposed trade #${e.trade} to ${P(e.to)}`;
    case "trade_accepted": return `${P(e.to)} accepted trade #${e.trade}`;
    case "trade_declined": return `Trade #${e.trade} declined`;
    case "trade_cancelled": return `Trade #${e.trade} cancelled`;
    case "player_bankrupt": return `${P(e.player)} went bankrupt`;
    case "player_resigned": return `${P(e.player)} resigned`;
    case "game_ended": return `Game over — ${P(e.winner)} wins!`;
    case "time_up": return `Time's up! ${P(e.winner)} wins on net worth.`;
    case "won_by_groups": return `${P(e.winner)} wins by controlling ${e.groups} colour groups!`;
    case "won_by_points": return `${P(e.player)} wins with ${e.points} victory points!`;
    case "won_by_pool_exhaustion": return `The conglomerate pool ran dry — ${P(e.winner)} wins on victory points!`;
    case "market_event_activated": {
      const sign = e.magnitude_pct > 0 ? "+" : "";
      return e.duration_turns === 0
        ? `Market event: ${marketEventName(e.event_id)} (${sign}${e.magnitude_pct}%)`
        : `Market event: ${marketEventName(e.event_id)} (${sign}${e.magnitude_pct}% for ${e.duration_turns} turns)`;
    }
    case "market_event_expired": return `Market event ended: ${marketEventName(e.event_id)}`;
    default: return JSON.stringify(e);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
</script>
