[package]
name = "parcello-server"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[[bin]]
name = "parcello-server"
path = "src/main.rs"

[dependencies]
parcello-engine = { path = "../engine" }
parcello-mods = { path = "../mods" }
parcello-protocol = { path = "../protocol" }

axum = { version = "0.7", features = ["ws"] }
clap = { version = "4.5, <4.6", features = ["derive"] }
rand = "0.8"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Manual HS256 JWT verification: pure-Rust, no ring build dependency.
# The production Identity Service will use asymmetric keys (see ADR-0003).
base64 = "0.22"
hmac = "0.12"
sha2 = "0.10"
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }
# 0.32+ raises MSRV past 1.75; bundled avoids a system libsqlite3 dependency.
rusqlite = { version = "0.31, <0.32", features = ["bundled"] }

[dev-dependencies]
tempfile = "3.10, <3.15"
