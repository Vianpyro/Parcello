<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Parcello - Flutter Web perf trends</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 24px;
    background: Canvas;
    color: CanvasText;
  }
  h1 { font-size: 1.3rem; margin: 0 0 4px; }
  p.sub { color: GrayText; margin: 0 0 24px; font-size: 0.9rem; }
  .chart { margin-bottom: 32px; }
  .chart h2 { font-size: 1rem; margin: 0 0 8px; }
  canvas { width: 100%; height: 260px; border: 1px solid color-mix(in srgb, CanvasText 20%, transparent); border-radius: 8px; }
  .empty { color: GrayText; font-style: italic; }
  footer { margin-top: 32px; color: GrayText; font-size: 0.8rem; }
  code { font-size: 0.85em; }
</style>
</head>
<body>
<h1>Flutter Web perf trends</h1>
<p class="sub">One point per successful build on <code>main</code> (see docs/web-performance.md, "Performance history"). Data: <a href="perf-history.json">perf-history.json</a>.</p>
<div id="charts"></div>
<footer>Generated by <code>clients/flutter/tool/record_perf_history.py</code>.</footer>
<script>
const HISTORY = [{"date": "2026-07-22T19:54:20+00:00", "sha": "a06ed341dc6c34ba489def86c0ff90ba62a31908", "run_url": "https://github.com/Vianpyro/Parcello/actions/runs/29952646424", "js_brotli_kb": 705.0, "fonts_brotli_kb": 978.2, "canvaskit_brotli_kb": 1594.5, "total_brotli_kb": 3321.0, "performance_score": 98.0}, {"date": "2026-07-22T20:47:51+00:00", "sha": "840b67fcd48369d5e7f30a2a7c0fea89851ed487", "run_url": "https://github.com/Vianpyro/Parcello/actions/runs/29956320584", "js_brotli_kb": 705.1, "fonts_brotli_kb": 978.2, "canvaskit_brotli_kb": 1594.5, "total_brotli_kb": 3321.1, "performance_score": 96.0}, {"date": "2026-07-22T23:43:44+00:00", "sha": "8a9f2777b69aeec4f111dfaab936341cb14412a8", "run_url": "https://github.com/Vianpyro/Parcello/actions/runs/29966780449", "js_brotli_kb": 704.3, "fonts_brotli_kb": 978.2, "canvaskit_brotli_kb": 1594.5, "total_brotli_kb": 3320.2, "performance_score": 98.0}];

const SERIES = [
  { title: "Lighthouse Performance score", key: "performance_score", unit: "", color: "#2563eb" },
  { title: "First Contentful Paint", key: "fcp_ms", unit: " ms", color: "#7c3aed" },
  { title: "Largest Contentful Paint", key: "lcp_ms", unit: " ms", color: "#db2777" },
  { title: "Application JS (Brotli)", key: "js_brotli_kb", unit: " KB", color: "#059669" },
  { title: "Fonts (Brotli)", key: "fonts_brotli_kb", unit: " KB", color: "#d97706" },
  { title: "CanvasKit renderer (Brotli)", key: "canvaskit_brotli_kb", unit: " KB", color: "#0891b2" },
  { title: "First-load total (Brotli)", key: "total_brotli_kb", unit: " KB", color: "#dc2626" },
];

function drawChart(canvas, points, color, unit) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pad = { l: 48, r: 12, t: 12, b: 24 };
  const fg = getComputedStyle(document.body).color;
  ctx.clearRect(0, 0, w, h);

  const values = points.map(p => p.v);
  let min = Math.min(...values), max = Math.max(...values);
  if (min === max) { min -= 1; max += 1; }
  const margin = (max - min) * 0.1;
  min -= margin; max += margin;

  const x = i => pad.l + (i / Math.max(points.length - 1, 1)) * (w - pad.l - pad.r);
  const y = v => h - pad.b - ((v - min) / (max - min)) * (h - pad.t - pad.b);

  ctx.strokeStyle = "color-mix(in srgb, " + fg + " 25%, transparent)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, h - pad.b); ctx.lineTo(w - pad.r, h - pad.b);
  ctx.stroke();

  ctx.fillStyle = fg;
  ctx.font = "11px system-ui, sans-serif";
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  ctx.fillText(max.toFixed(1), pad.l - 6, pad.t + 4);
  ctx.fillText(min.toFixed(1), pad.l - 6, h - pad.b - 4);

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  points.forEach((p, i) => {
    const px = x(i), py = y(p.v);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  });
  ctx.stroke();

  ctx.fillStyle = color;
  points.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(x(i), y(p.v), 3, 0, Math.PI * 2);
    ctx.fill();
  });

  canvas.onmousemove = (ev) => {
    const bx = ev.offsetX;
    let nearest = 0, best = Infinity;
    points.forEach((p, i) => {
      const d = Math.abs(x(i) - bx);
      if (d < best) { best = d; nearest = i; }
    });
    const p = points[nearest];
    canvas.title = p.date + " (" + p.sha.slice(0, 7) + "): " + p.v + unit;
  };
}

const container = document.getElementById("charts");
if (!HISTORY.length) {
  container.innerHTML = '<p class="empty">No data yet.</p>';
} else {
  SERIES.forEach(s => {
    const points = HISTORY
      .filter(r => r[s.key] !== undefined && r[s.key] !== null)
      .map(r => ({ date: r.date, sha: r.sha, v: r[s.key] }));
    if (!points.length) return;
    const section = document.createElement("div");
    section.className = "chart";
    const latest = points[points.length - 1].v;
    section.innerHTML = '<h2>' + s.title + ' <span style="color:GrayText;font-weight:normal">(latest: ' +
      latest + s.unit + ')</span></h2><canvas></canvas>';
    container.appendChild(section);
    drawChart(section.querySelector("canvas"), points, s.color, s.unit);
  });
}
</script>
</body>
</html>
