# V1 rule hook points. Mods loaded after `base` override these per key
# (last-loaded-wins). Unknown keys are ignored with a warning.
#
# Fast-board tuning: a bit less starting cash than the classic long game
# so pressure builds sooner. Every landing on an unowned property opens a
# 5s sealed-bid window (ADR-0018) - not a rule flag, always on.

[rules]
starting_balance = 1200
go_salary = 200
jail_fine = 50
max_houses_per_property = 5
bankruptcy_threshold = 0
# Aggressive mechanics for swingy games (ADR-0011/0012):
# expropriation = pay 200% of a rival's unimproved property to seize it
# (they get 100% back); rent_boost = pay 100% of price per +50% rent step.
expropriation = 200
rent_boost = 100
# Domination win off: the primary v2 win condition is the victory-point
# race below (ADR-0020) - 3 groups would short-circuit it at 9 points.
win_full_groups = 0
# Race to 20 victory points (ADR-0020): 3 per complete colour group, 2 per
# conglomerate-level tile, 1 per resort owned, +2/round to the cash
# leader. Also arms the conglomerate-pool "doom clock" below.
win_victory_points = 20
# Shared building pools (ADR-0019): table-wide stock of subsidiaries
# (levels 1..max-1) and conglomerates (the top level), sized
# round(factor * sqrt(players)) at game start.
subsidiary_pool_factor = 6
conglomerate_pool_factor = 3
