# Default board: 32 tiles on a 9x9 ring, tuned for fast/dynamic games
# (Business-Tour direction, see docs/business-tour-direction.md). Shorter
# laps than a 40-tile Monopoly-style board, no Community Chest. Two
# "utility" tiles (group-scaled, like Monopoly's Water Works/Electric
# Company - ownership-count rent scaling was already exactly the right
# model, no dice to port since ADR-0017 removed them): Wi-Fi and The
# Chatbot, modern reinterpretations rather than the original "resorts"
# idea. Only 2 exist, so rents[2..5] are unreachable padding - rents[0]/
# rents[1] (owning one vs. both) carry the tile's whole economic weight,
# especially since group_scaled rejects Build (no house escalation to
# fall back on), hence the steep 100 -> 400 jump for the full pair.
# Two chance tiles, one tax tile. Position 20 is deliberately
# chance: with the 2..6 velocity range every player's first full hand
# cycle sums to exactly 20 tiles moved, so everyone converges on this
# tile in turn 1 regardless of play order - a random draw there is more
# fun than a deterministic rent trap. Position 28 (between Go To Jail and
# Go) is chance for the same "keep the run-in to Go lively" reason, moved
# there from position 3 (too close to Go to matter much). Income Tax
# sits at position 31, the last tile before Go (like Monopoly, no dice
# needed for this one) - a player low on cash after a bad lap gets one
# final gut-check (possibly a forced mortgage/sale) right before the
# relief of another salary. The Exposition (pos 16) replaces the old
# free-parking no-op with the spotlight mechanic (ADR-0026). board[0]
# must be the Go tile; corners sit at 0, 8, 16, 24.

