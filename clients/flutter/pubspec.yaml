name: parcello_client
description: "A new Flutter project."
publish_to: 'none'
# PLACEHOLDER only - Flutter requires a `version:`, but this is NOT the app's
# version. The real one is the workspace version in the root Cargo.toml (the
# single source of truth), injected at build time via
# --dart-define=PARCELLO_VERSION (tool/cargo_version.sh) and read as a const in
# lib/version.dart. Do not bump this by hand; nothing reads it for display.
version: 0.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  audioplayers: ^6.8.1
  crypto: ^3.0.7
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  intl: any
  web: ^1.1.0
  web_socket_channel: ^3.0.3
  # audioplayers: sound-effect playback (assets/sfx/). Present but not wired
  # yet - the SFX hookup is the next step now that Developer Mode is on.
  # http: portable HTTP client (OIDC discovery/token exchange, web+native).
  # web: browser bindings (OIDC popup flow, local storage) - web target only,
  # unused on native builds but harmless to depend on everywhere.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Generate the typed AppLocalizations from lib/l10n/*.arb (config in
  # l10n.yaml). EN is the template; FR ships alongside. Author every new
  # user-facing string as an ARB key, never a literal in a widget.
  generate: true
  assets:
    - assets/sfx/
    # OFL licence texts, bundled so they ship with the fonts (OFL requirement)
    # and can be surfaced in-app via LicenseRegistry (see main.dart).
    - assets/fonts/Inter-OFL.txt
    - assets/fonts/Fraunces-OFL.txt
    - assets/fonts/SourceSerif4-OFL.txt
  # Typography from docs/visual-identity.md, bundled for offline use. All
  # three are variable fonts (one file spans every weight), OFL 1.1. See
  # assets/fonts/README.md for provenance + SHA256SUMS.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces.ttf
    - family: SourceSerif4
      fonts:
        - asset: assets/fonts/SourceSerif4.ttf
