name: parcello_client
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  audioplayers: ^6.8.1
  crypto: ^3.0.7
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.3
  # Sound effects: add `audioplayers: ^6.8.1` here to enable playback.
  # On Windows it needs Developer Mode enabled (native plugin symlinks):
  # run `start ms-settings:developers`. See assets/sfx/README.md.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sfx/
