<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="parcello_client">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>parcello_client</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Loading splash (removed on the "flutter-first-frame" event below). Once
    Flutter attaches, the whole UI paints to a single <canvas> (CanvasKit,
    ADR-0025) which the browser's native Largest Contentful Paint API cannot
    see -- a canvas paint is not an LCP candidate, only <img>/text/
    background-image elements are. Without a real DOM element visible before
    that hand-off, Lighthouse (and RUM/CrUX for real users) has nothing to
    report and Performance never gets a score, even though the app loaded
    fine (see docs/web-performance.md, "Why the loading splash exists").
    This splash is a real loading indicator, not a Lighthouse-only shim: it
    gives every visitor genuine feedback while the ~3 MB Brotli bundle
    downloads, and it happens to also be the page's only LCP candidate.
  -->
  <style>
    #pc-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #14171C;
      color: #ECE6D8;
      font-family: system-ui, sans-serif;
    }
    #pc-splash img { width: 96px; height: 96px; }
    #pc-splash p { margin: 0; font-size: 1rem; letter-spacing: 0.04em; color: #D8B45A; }
  </style>
</head>
<body>
  <div id="pc-splash">
    <img src="icons/Icon-192.png" width="96" height="96" alt="Parcello">
    <p>Loading Parcello&hellip;</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('pc-splash');
      if (splash) splash.remove();
    });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
