name: Flutter

# Quality gate for the one client (clients/flutter, ADR-0025). Kept as its
# own workflow so Rust-only changes never pay the Flutter SDK setup, and
# vice versa. `flutter analyze` and `flutter test` are the same checks the
# devcontainer runs locally (see clients/flutter/README.md).

on:
  push:
    branches: [main]
    # Keep the two lists identical (no YAML anchors in GHA). The
    # protocol-adjacent paths close the CI blind spot from
    # docs/protocol-duplication-audit.md (S1): a Rust-only change to the
    # wire types must still run the Dart golden-fixture test
    # (test/protocol_fixtures_test.dart), since nothing else in CI
    # exercises Dart against them. Kept narrow on purpose - only the files
    # that define wire-tagged enums, not the whole engine/protocol crates.
    paths:
      - "clients/flutter/**"
      - ".github/workflows/flutter.yml"
      - "crates/protocol/**"
      - "crates/engine/src/command.rs"
      - "crates/engine/src/event.rs"
      - "crates/engine/src/error.rs"
      - "protocol-fixtures/**"
  pull_request:
    paths:
      - "clients/flutter/**"
      - ".github/workflows/flutter.yml"
      - "crates/protocol/**"
      - "crates/engine/src/command.rs"
      - "crates/engine/src/event.rs"
      - "crates/engine/src/error.rs"
      - "protocol-fixtures/**"
  # Callable from ci.yml (job `protocol-flutter`): a protocol-only PR still
  # needs this workflow's result inside the *required* `CI OK` check, since
  # this workflow on its own isn't a required status (README: "Branch
  # protection only needs the aggregate CI OK check"). Reusing this
  # workflow's own job means there is exactly one place that knows how to
  # run the Flutter checks, called on its own paths trigger above.
  workflow_call:

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # One job: the SDK setup dominates the runtime, so splitting
  # analyze/test across runners would only slow things down.
  check:
    name: analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/flutter
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      # Resolve deps AND run gen-l10n (flutter: generate: true) so the
      # generated AppLocalizations exists before analyze/test - it is
      # gitignored (derived from lib/l10n/*.arb), so a clean runner must
      # produce it explicitly rather than rely on an implicit pub get.
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      # The web target is what the server ships (--web-dir); make sure it
      # still compiles even when nobody built it locally.
      - run: flutter build web --release --dart-define=PARCELLO_GIT_SHA=${{ github.sha }}
