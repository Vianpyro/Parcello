# Four languages are actually present in this repo:
#   - rust: the engine/server/mods/protocol/cli crates - the code that
#     matters most here. build-mode: none - CodeQL's Rust extractor parses
#     source directly, no cargo build required.
#   - actions: the workflows in this directory themselves (injection via
#     untrusted `${{ }}` expansion, secrets misuse, etc).
#   - c-cpp / swift: the Flutter desktop runner shells
#     (clients/flutter/linux, clients/flutter/macos) are generated
#     boilerplate with no hand-written logic, but they need a real
#     `flutter build` first so CMake/xcodebuild have something to trace -
#     same step release.yml already runs for packaging.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze-rust:
    name: CodeQL / rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@v4

  analyze-actions:
    name: CodeQL / actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@v4

  analyze-cpp:
    name: CodeQL / c-cpp (flutter linux runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: linux desktop toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended,security-and-quality
      - run: flutter build linux --release
        working-directory: clients/flutter
      - uses: github/codeql-action/analyze@v4

  analyze-swift:
    name: CodeQL / swift (flutter macos runner)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual
          queries: security-extended,security-and-quality
      - run: flutter build macos --release
        working-directory: clients/flutter
      - uses: github/codeql-action/analyze@v4
