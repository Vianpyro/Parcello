# Three languages are actually scanned in this repo:
#   - rust: the engine/server/mods/protocol/cli crates - the code that
#     matters most here. build-mode: none - CodeQL's Rust extractor parses
#     source directly, no cargo build required.
#   - actions: the workflows in this directory themselves (injection via
#     untrusted `${{ }}` expansion, secrets misuse, etc).
#   - c-cpp: the Flutter Linux runner shell (clients/flutter/linux) is
#     generated boilerplate with no hand-written logic, but it needs a
#     real `flutter build` first so CMake has something to trace - same
#     step release.yml already runs for packaging.
# Swift (clients/flutter/macos) is deliberately NOT scanned: CodeQL's
# Swift extractor can't trace a `flutter build macos` compile on the
# hosted macOS runners (Xcode 26's build system - "CodeQL detected code
# written in Swift but this run didn't build any of it", survives even
# after killing XCBBuildService before the build). Since that Swift is
# 100% Flutter-generated boilerplate with no hand-written logic anyway,
# it isn't worth chasing an Apple/GitHub build-system compatibility issue
# neither side controls. Revisit if github/codeql-action ships a fix.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze-rust:
    name: CodeQL / rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@v4

  analyze-actions:
    name: CodeQL / actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/analyze@v4

  analyze-cpp:
    name: CodeQL / c-cpp (flutter linux runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: linux desktop toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended,security-and-quality
      - run: flutter build linux --release
        working-directory: clients/flutter
      - uses: github/codeql-action/analyze@v4
