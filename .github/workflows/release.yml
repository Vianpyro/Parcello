name: Release

# One release stream: the workspace version in Cargo.toml names the release
# (tag vX.Y.Z). Bumping it on main creates the release and attaches every
# artifact; keep clients/flutter/pubspec.yaml in step (it stamps the exe).
# Re-pushing without a bump is a no-op: the tag already exists.

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "clients/flutter/pubspec.yaml"
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs: a draft release does not reserve its tag, so two quick
# pushes could otherwise both pass the tag-exists check and double-draft.
concurrency:
  group: release

jobs:
  version:
    name: detect version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      release: ${{ steps.check.outputs.release }}
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code origin "refs/tags/v$version" > /dev/null; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "tag v$version already exists; nothing to release"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
      # Draft first; the publish job flips it live once all assets are up.
      - name: create draft release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.check.outputs.version }}" \
            --draft --generate-notes \
            --title "Parcello v${{ steps.check.outputs.version }}" \
            --target "$GITHUB_SHA"

  # Platform-independent: built once, bundled into every server tarball
  # below (ADR-0025 - the server serves it from --web-dir/PARCELLO_WEB_DIR
  # at runtime, mirroring --mods-dir, not compiled into the binary).
  web:
    name: flutter web client
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter build web --release
        working-directory: clients/flutter
      - uses: actions/upload-artifact@v7
        with:
          name: flutter-web
          path: clients/flutter/build/web
          # Consumed only by the server legs in this same run; no reason to
          # keep it in storage afterwards.
          retention-days: 1

  server:
    name: server + cli (${{ matrix.label }})
    needs: [version, web]
    if: needs.version.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: windows-latest
            label: windows-x64
          - os: macos-latest
            label: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked -p parcello-server -p parcello-cli
      # Smoke test: the freshly built binaries must at least start and print
      # their version (every matrix leg runs on its native arch, so this
      # executes everywhere, arm64 included). Catches a DOA build before it
      # is ever packaged and shipped.
      - name: smoke test binaries
        shell: bash
        run: |
          ext=""
          [ "$RUNNER_OS" = "Windows" ] && ext=".exe"
          "target/release/parcello-server$ext" --version
          "target/release/parcello-cli$ext" --version
      - uses: actions/download-artifact@v8
        with:
          name: flutter-web
          path: build/web
      # The server reads ./mods and ./web at runtime: ship both inside the
      # archive (the web client is built once above and identical across
      # every server OS/arch leg).
      - name: package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/parcello
          cp target/release/parcello-server target/release/parcello-cli dist/parcello/
          cp -r mods dist/parcello/mods
          cp -r build/web dist/parcello/web
          cp README.md dist/parcello/
          tar -C dist -czf "parcello-server-v${{ needs.version.outputs.version }}-${{ matrix.label }}.tar.gz" parcello
      - name: package (windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist/parcello | Out-Null
          Copy-Item target/release/parcello-server.exe, target/release/parcello-cli.exe dist/parcello/
          Copy-Item -Recurse mods dist/parcello/mods
          Copy-Item -Recurse build/web dist/parcello/web
          Copy-Item README.md dist/parcello/
          Compress-Archive -Path dist/parcello -DestinationPath "parcello-server-v${{ needs.version.outputs.version }}-${{ matrix.label }}.zip"
      - name: upload
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ needs.version.outputs.version }}" parcello-server-v*

  client:
    name: flutter client (${{ matrix.label }})
    needs: version
    if: needs.version.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-latest
            label: linux-x64
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: linux desktop toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - name: build (windows)
        if: runner.os == 'Windows'
        run: flutter build windows --release
        working-directory: clients/flutter
      - name: build (linux)
        if: runner.os == 'Linux'
        run: flutter build linux --release
        working-directory: clients/flutter
      - name: build (macos)
        if: runner.os == 'macOS'
        run: flutter build macos --release
        working-directory: clients/flutter
      - name: package (windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path clients/flutter/build/windows/x64/runner/Release/* `
            -DestinationPath "parcello-client-v${{ needs.version.outputs.version }}-${{ matrix.label }}.zip"
      - name: package (linux)
        if: runner.os == 'Linux'
        run: |
          tar -C clients/flutter/build/linux/x64/release -czf \
            "parcello-client-v${{ needs.version.outputs.version }}-${{ matrix.label }}.tar.gz" bundle
      - name: package (macos)
        if: runner.os == 'macOS'
        # ditto preserves the .app bundle metadata; plain zip breaks it.
        run: |
          ditto -c -k --keepParent \
            clients/flutter/build/macos/Build/Products/Release/parcello_client.app \
            "parcello-client-v${{ needs.version.outputs.version }}-${{ matrix.label }}.zip"
      - name: upload
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ needs.version.outputs.version }}" parcello-client-v*

  # Steam-ready all-in-one: client at the root, server + mods in server/.
  # The linux variant also covers the Steam Deck (linux x64).
  bundle:
    name: all-in-one (${{ matrix.label }})
    needs: [version, server, client]
    if: needs.version.outputs.release == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: ubuntu-latest
            label: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: assemble and upload (windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $V = "${{ needs.version.outputs.version }}"
          gh release download "v$V" --pattern "parcello-server-v$V-windows-x64.zip" --pattern "parcello-client-v$V-windows-x64.zip"
          Expand-Archive "parcello-client-v$V-windows-x64.zip" -DestinationPath allinone
          Expand-Archive "parcello-server-v$V-windows-x64.zip" -DestinationPath tmp
          Move-Item tmp/parcello allinone/server
          Compress-Archive -Path allinone/* -DestinationPath "parcello-allinone-v$V-windows-x64.zip"
          gh release upload "v$V" "parcello-allinone-v$V-windows-x64.zip"
      - name: assemble and upload (linux)
        if: runner.os == 'Linux'
        # tar keeps the executable bits, which zip would lose.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          V="${{ needs.version.outputs.version }}"
          gh release download "v$V" --pattern "parcello-server-v$V-linux-x64.tar.gz" --pattern "parcello-client-v$V-linux-x64.tar.gz"
          mkdir -p parcello/server
          tar -xzf "parcello-client-v$V-linux-x64.tar.gz" -C parcello --strip-components=1
          tar -xzf "parcello-server-v$V-linux-x64.tar.gz" -C parcello/server --strip-components=1
          tar -czf "parcello-allinone-v$V-linux-x64.tar.gz" parcello
          gh release upload "v$V" "parcello-allinone-v$V-linux-x64.tar.gz"

  # Integrity + provenance for every attached asset. Runs after all uploads
  # but BEFORE publish, so SHA256SUMS (and its Sigstore signature) are in the
  # release the instant it goes public. Also the single place that asserts
  # the release is complete: the expected-asset check fails the run if any
  # matrix leg silently dropped its upload.
  checksums:
    name: checksums + signing
    needs: [version, server, client, bundle]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach SHA256SUMS (+ signature) to the release
      id-token: write # Sigstore keyless signing via GitHub OIDC
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }} # no checkout in this job; gh needs it
      V: ${{ needs.version.outputs.version }}
    steps:
      - name: download every attached asset
        run: |
          mkdir -p assets
          gh release download "v$V" --dir assets --pattern 'parcello-*'
      - name: verify all expected artifacts are present
        run: |
          expected=(
            "parcello-server-v$V-linux-x64.tar.gz"
            "parcello-server-v$V-linux-arm64.tar.gz"
            "parcello-server-v$V-windows-x64.zip"
            "parcello-server-v$V-macos-arm64.tar.gz"
            "parcello-client-v$V-windows-x64.zip"
            "parcello-client-v$V-linux-x64.tar.gz"
            "parcello-client-v$V-macos.zip"
            "parcello-allinone-v$V-windows-x64.zip"
            "parcello-allinone-v$V-linux-x64.tar.gz"
          )
          missing=0
          for f in "${expected[@]}"; do
            [ -f "assets/$f" ] || { echo "MISSING: $f" >&2; missing=1; }
          done
          [ "$missing" = 0 ] || { echo "release is incomplete" >&2; exit 1; }
      - name: validate archive integrity + contents
        run: |
          cd assets
          fail=0
          for a in *.tar.gz; do tar -tzf "$a" >/dev/null || { echo "corrupt: $a" >&2; fail=1; }; done
          for a in *.zip;    do unzip -tqq "$a" >/dev/null || { echo "corrupt: $a" >&2; fail=1; }; done
          # Every server archive must actually carry the server binary.
          for a in parcello-server-*.tar.gz; do tar -tzf "$a" | grep -qE 'parcello-server(\.exe)?$' || { echo "no server binary in $a" >&2; fail=1; }; done
          for a in parcello-server-*.zip;    do unzip -l  "$a" | grep -qE 'parcello-server(\.exe)?'  || { echo "no server binary in $a" >&2; fail=1; }; done
          [ "$fail" = 0 ]
      - name: generate SHA256SUMS
        run: |
          cd assets
          sha256sum parcello-* | sort -k2 > ../SHA256SUMS
          cat ../SHA256SUMS
      # Best-effort signing: a Sigstore outage or a fork without OIDC must
      # never fail the release, so both steps continue-on-error and the
      # upload only attaches .sig/.pem if they were produced. Authenticode /
      # Apple notarization would slot in here later as extra sign steps
      # against the same SHA256SUMS - the verification story stays one file.
      - name: install cosign
        id: cosign
        continue-on-error: true
        uses: sigstore/cosign-installer@v3
      - name: sign checksums (Sigstore keyless)
        if: steps.cosign.outcome == 'success'
        continue-on-error: true
        run: |
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem
      - name: upload checksums (+ signature if present)
        run: |
          files=(SHA256SUMS)
          [ -f SHA256SUMS.sig ] && files+=(SHA256SUMS.sig)
          [ -f SHA256SUMS.pem ] && files+=(SHA256SUMS.pem)
          gh release upload "v$V" "${files[@]}" --clobber

  publish:
    name: publish release
    needs: [version, server, client, bundle, checksums]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "v${{ needs.version.outputs.version }}" --draft=false

  # Independent of the release assets: a failed image push never blocks
  # the binary release.
  docker:
    name: docker image (ghcr)
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - id: image
        # GHCR requires a lowercase repository path.
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-server" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:v${{ needs.version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
