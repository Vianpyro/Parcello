# typos-cli config (CI `lint` job). Only generated/third-party trees are
# excluded - hand-written code and docs are all checked.
[files]
extend-exclude = [
    # Flutter platform runners are generated boilerplate (pbxproj/xib
    # identifiers trip the dictionary).
    "clients/flutter/macos/",
    "clients/flutter/linux/",
    "clients/flutter/windows/",
    "clients/flutter/web/",
    "clients/flutter/build/",
    "Cargo.lock",
    "clients/flutter/pubspec.lock",
    # Translations: typos only has an English dictionary, so a French ARB is a
    # wall of false positives (`sur` -> `sure`, `complet` -> `complete`, ...).
    # The English template stays checked - it is the one file where a real typo
    # would be authored, and it seeds every other locale. Any locale added later
    # is excluded by this glob without touching this list again.
    "clients/flutter/lib/l10n/*.arb",
    "!clients/flutter/lib/l10n/app_en.arb",
]
